{% extends "layout.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="login-page">
  <div class="login-card glass-card">
    <!-- Card Header with Icon -->
    <div class="login-header">
      <div class="login-icon">
        <i class="fa fa-shield-halved"></i>
      </div>
      <h2 class="login-title">Welcome Back</h2>
      <p class="login-subtitle">Access your secure cloud workspace</p>
    </div>
    
    <!-- Login Form -->
    <div class="login-body">
      <form method="post" class="login-form">
        <div class="form-group-custom">
          <label class="form-label-custom">
            <i class="fa fa-envelope"></i>
            Email Address
          </label>
          <input type="email" name="email" class="form-input-custom" placeholder="Enter your email" required>
        </div>
        
        <div class="form-group-custom">
          <label class="form-label-custom">
            <i class="fa fa-lock"></i>
            Password
          </label>
          <input type="password" name="password" class="form-input-custom" placeholder="Enter your password" required>
        </div>
        
        <div class="form-options">
          <div class="form-check">
            <input type="checkbox" class="form-check-input" id="remember">
            <label class="form-check-label" for="remember">Remember me</label>
          </div>
          <a href="#" class="forgot-link">Forgot Password?</a>
        </div>
        
        <button type="submit" class="btn btn-login w-100">
          <i class="fa fa-right-to-bracket"></i>
          Sign In
        </button>
      </form>
      
      <!-- Divider -->
      <div class="login-divider">
        <span>or</span>
      </div>
      
      <!-- Demo Credentials -->
      <div class="demo-credentials">
        <div class="demo-header">
          <i class="fa fa-circle-info"></i>
          <span>Demo Credentials</span>
        </div>
        <div class="demo-content">
          <p><strong>Admin:</strong> admin@securecloud.com</p>
          <p><strong>Password:</strong> Admin@123</p>
        </div>
      </div>
      
      <!-- Sign Up Link -->
      <div class="signup-prompt">
        <span>Don't have an account?</span>
        <a href="{{ url_for('register') }}">Sign Up</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
